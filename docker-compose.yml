version: '3.8'

services:
  mongodb:
    image: mongo:7.0                      # MongoDB version 7.0
    container_name: auth-template-mongodb-ts      # Container name for easy reference
    restart: unless-stopped               # Auto-restart on crashes
    ports:
      - "27017:27017"                     # Expose MongoDB on default port
    environment:
      MONGO_INITDB_DATABASE: auth_template # Create this database on first run
    volumes:
      - mongodb_data:/data/db             # Persist data between restarts
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s                       # Check every 10 seconds
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
    driver: local                         # Store data locally on your machine
